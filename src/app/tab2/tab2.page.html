<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title> Fotos </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Fotos</ion-title>
    </ion-toolbar>
  </ion-header>

  @if (photoService.photos().length === 0) {
  <div class="ion-text-center">
    <h3>Seus registros fotográficos</h3>
    <p>
      Para tirar uma nova foto, basta acessar a câmera azul no centro da tela.
    </p>
  </div>
  }

  <ion-grid>
    <ion-row>
      <ion-col
        size="6"
        *ngFor="let photo of photoService.photos(); index as position"
      >
        <!-- CHANGE: Add a click event listener to each image -->
        <ion-img
          [src]="photo.webviewPath"
          (click)="showActionSheet(photo, position)"
        ></ion-img>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-action-sheet
    [isOpen]="isActionSheetOpen()"
    header="Qual ação deseja realizar?"
    [buttons]="actionSheetButtons()"
    (didDismiss)="setCloseActionSheet()"
  >
  </ion-action-sheet>

  <ion-alert
    [isOpen]="isAlertOpen()"
    header="Tem certeza que deseja excluir esta foto?"
    [buttons]="alertButtons()"
    (didDismiss)="setCloseAlert()"
  ></ion-alert>

  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <!-- CHANGE: Add a click event listener to the floating action button -->
    <ion-fab-button (click)="addPhotoToGallery()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- <app-explore-container name="Tab 2 page"></app-explore-container> -->
</ion-content>
